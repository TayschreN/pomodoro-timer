<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--primary)" />
                <stop offset="100%" stop-color="var(--accent)" />
            </linearGradient>
        </defs>
    </svg>

    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">P</div>
                <span class="logo-text">Pomodoro</span>
            </div>
            <div class="session-tabs" id="sessionTabs">
                <button class="tab active" data-session="focus">Foco</button>
                <button class="tab" data-session="shortBreak">Pausa Curta</button>
                <button class="tab" data-session="longBreak">Pausa Longa</button>
            </div>
            <div class="header-actions">
                <button class="ghost-btn" id="subjectsBtn" title="Minhas Matérias">📚 Matérias</button>
                <button class="ghost-btn" id="reportBtn" title="Relatório">📊 Relatório</button>
                <button class="ghost-btn" id="achievementsBtn" title="Conquistas">🏆</button>
                <button class="icon-btn" id="settingsBtn" title="Configurações">⚙</button>
            </div>
        </header>

        <main class="main-content">
            <div class="timer-section">
                <div class="timer-container">
                    <div class="progress-ring-container">
                        <svg class="progress-ring" viewBox="0 0 300 300">
                            <circle
                                class="progress-ring-bg"
                                cx="150" cy="150" r="130"
                                fill="none"
                                stroke-width="8"
                            />
                            <circle
                                class="progress-ring-fill"
                                cx="150" cy="150" r="130"
                                fill="none"
                                stroke-width="8"
                                stroke-linecap="round"
                                stroke-dasharray="816.81"
                                stroke-dashoffset="0"
                            />
                        </svg>
                        <div class="timer-display">
                            <span class="timer-time" id="timerDisplay">25:00</span>
                            <span class="timer-label" id="sessionLabel">Foco</span>
                            <div class="session-pomodoros" id="sessionPomodoros">
                                <span class="pomodoro-dot completed"></span>
                                <span class="pomodoro-dot"></span>
                                <span class="pomodoro-dot"></span>
                                <span class="pomodoro-dot"></span>
                                <span class="pomodoro-dot"></span>
                            </div>
                            <div class="timer-controls">
                                <button class="btn primary-btn" id="startBtn">Iniciar</button>
                                <button class="icon-btn" id="skipBtn" title="Pular">⏭</button>
                                <button class="icon-btn" id="resetBtn" title="Reiniciar">↻</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="active-subject" id="activeSubject" title="Clique para trocar de matéria">
                    <div class="no-subject" id="noSubjectMsg">
                        Nenhuma matéria selecionada
                        <div class="select-subject-hint">Clique em 📚 Matérias para começar</div>
                    </div>
                    <div id="subjectContent" style="display:none">
                        <div class="subject-header">
                            <div class="subject-name">
                                <div class="subject-icon" id="subjectIcon">📖</div>
                                <span id="subjectNameDisplay">Matéria</span>
                            </div>
                            <span class="subject-stats" id="subjectStats">0 de 0</span>
                        </div>
                        <div class="subject-progress-bar">
                            <div class="subject-progress-fill" id="subjectProgressFill"></div>
                        </div>
                        <div class="subject-faltam" id="subjectFaltam">faltam 0 pomodoros</div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="theme-panel" id="themePanel">
            <div class="theme-panel-header">
                <h3>Temas</h3>
                <button class="icon-btn" id="closeThemePanel">✕</button>
            </div>
            <div class="theme-grid" id="themeGrid"></div>
            <button class="btn secondary-btn" id="newThemeBtn">+ Novo Tema</button>
        </aside>

        <button class="fab" id="fabThemeBtn" title="Temas">🎨</button>
    </div>

    <div class="modal-overlay hidden" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Configurações</h2>
                <button class="icon-btn modal-close" data-modal="settingsModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="focusTime">Foco (minutos)</label>
                    <input type="number" id="focusTime" min="1" max="120" value="25">
                </div>
                <div class="form-group">
                    <label for="shortBreakTime">Pausa Curta (minutos)</label>
                    <input type="number" id="shortBreakTime" min="1" max="60" value="5">
                </div>
                <div class="form-group">
                    <label for="longBreakTime">Pausa Longa (minutos)</label>
                    <input type="number" id="longBreakTime" min="1" max="120" value="15">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn secondary-btn modal-close" data-modal="settingsModal">Cancelar</button>
                <button class="btn primary-btn" id="saveSettings">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="themeEditor">
        <div class="modal">
            <div class="modal-header">
                <h2 id="themeEditorTitle">Novo Tema</h2>
                <button class="icon-btn modal-close" data-modal="themeEditor">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="themeName">Nome do Tema</label>
                    <input type="text" id="themeName" placeholder="Ex: Meu Tema">
                </div>
                <div class="color-picker-group">
                    <div class="color-field">
                        <label for="themeBg">Fundo</label>
                        <input type="color" id="themeBg" value="#faf5ff">
                    </div>
                    <div class="color-field">
                        <label for="themePrimary">Primária</label>
                        <input type="color" id="themePrimary" value="#8b5cf6">
                    </div>
                    <div class="color-field">
                        <label for="themeAccent">Destaque</label>
                        <input type="color" id="themeAccent" value="#c4b5fd">
                    </div>
                    <div class="color-field">
                        <label for="themeTimerColor">Timer</label>
                        <input type="color" id="themeTimerColor" value="#6d28d9">
                    </div>
                    <div class="color-field">
                        <label for="themeCardBg">Cartões</label>
                        <input type="color" id="themeCardBg" value="#ffffff">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn secondary-btn modal-close" data-modal="themeEditor">Cancelar</button>
                <button class="btn primary-btn" id="saveTheme">Salvar Tema</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="subjectsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Minhas Matérias</h2>
                <button class="icon-btn modal-close" data-modal="subjectsModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="subject-list" id="subjectList">
                    <div style="text-align:center;padding:24px 0;color:var(--text-secondary);font-size:14px">
                        Nenhuma matéria cadastrada ainda.
                    </div>
                </div>
                <button class="btn secondary-btn" id="addSubjectOpenBtn" style="width:100%">+ Nova Matéria</button>
                <div id="addSubjectForm" style="display:none">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="subjectName">Nome da matéria</label>
                            <input type="text" id="subjectName" placeholder="Ex: Matemática">
                        </div>
                        <div class="form-group">
                            <label for="subjectTarget">Meta (pomodoros)</label>
                            <input type="number" id="subjectTarget" min="1" max="999" value="30">
                        </div>
                    </div>
                    <button class="btn primary-btn" id="addSubjectBtn" style="width:100%">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="reportModal">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2>Relatório de Estudos</h2>
                <button class="icon-btn modal-close" data-modal="reportModal">✕</button>
            </div>
            <div class="modal-body" id="reportBody">
            </div>
            <div class="modal-footer">
                <button class="btn secondary-btn" id="clearHistoryBtn">Limpar Histórico</button>
                <button class="btn secondary-btn modal-close" data-modal="reportModal">Fechar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="achievementsModal">
        <div class="modal modal-large">
            <div class="modal-header">
                <h2>Conquistas</h2>
                <button class="icon-btn modal-close" data-modal="achievementsModal">✕</button>
            </div>
            <div class="modal-body" id="achievementsBody">
            </div>
            <div class="modal-footer">
                <button class="btn secondary-btn modal-close" data-modal="achievementsModal">Fechar</button>
            </div>
        </div>
    </div>

    <div class="notification hidden" id="notification">
        <span id="notificationMsg">Tempo esgotado!</span>
    </div>

    <script src="js/themes.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/subjects.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
